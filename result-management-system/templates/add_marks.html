<!DOCTYPE html>
<html>
<head>
    <title>Add Marks</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <a href="/admin/dashboard" class="btn btn-secondary mb-3">← Back</a>
        <div class="card">
            <div class="card-header">
                <h3>Add Marks</h3>
            </div>
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label class="form-label">Student</label>
                        <select class="form-select" name="student_id" required>
                            <option value="">Select Student</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Subject</label>
                        <select class="form-select" name="subject_id" required>
                            <option value="">Select Subject</option>
                        </select>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Marks (0-100)</label>
                        <input type="number" class="form-control" name="marks" max="100" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Add Marks</button>
                </form>
            </div>
        </div>
    </div>
</body>
</html>
